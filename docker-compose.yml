services:
  postgres:
    image: postgres:15-alpine
    container_name: hotelhub-postgres
    environment:
      POSTGRES_USER: hotel_admin
      POSTGRES_PASSWORD: hotel_password
      POSTGRES_DB: hotelhub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hotelhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: